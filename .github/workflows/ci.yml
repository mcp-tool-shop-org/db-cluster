name: CI
on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      sha:
        description: 'Commit SHA to test (default: HEAD)'
        required: false
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22, 24]
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.sha || github.sha }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'
      - run: npm ci
      # Build first — `lint:examples` resolves `db-cluster`, `db-cluster/sdk`,
      # `db-cluster/policy` (self-reference via package.json `exports`), which
      # requires dist/ to be populated. Without a prior build, tsc cannot
      # resolve the self-reference and the example typecheck fails with
      # TS2307 across every example file. Run order: build → lint → test.
      - run: npm run build
      - run: npm run lint
      - run: npm test
