name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write       # for GitHub Release creation
  id-token: write       # for npm provenance via Sigstore OIDC
  packages: write       # for GHCR push (docker job)

jobs:
  release:
    name: Publish to npm + GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install npm >=11.5 in sandbox for OIDC trusted-publishing auth
        run: |
          # The in-place 'npm install -g npm@latest' on Node 22's bundled npm
          # 10.9 races on its own arborist rebuild and breaks irrecoverably
          # (MODULE_NOT_FOUND: promise-retry). Workaround: install npm@latest
          # as a regular dependency into a sandbox directory and prepend its
          # bin to PATH. The system npm is left untouched; we just shadow it.
          SANDBOX="$HOME/.npm-cli-sandbox"
          mkdir -p "$SANDBOX"
          pushd "$SANDBOX" >/dev/null
          echo '{"name":"npm-cli-sandbox","version":"0.0.0","private":true}' > package.json
          npm install --no-save --no-audit --no-fund --silent npm@latest
          popd >/dev/null
          echo "$SANDBOX/node_modules/.bin" >> "$GITHUB_PATH"
          "$SANDBOX/node_modules/.bin/npm" --version

      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "Tag: ${GITHUB_REF_NAME} → ${TAG_VERSION}"
          echo "Package: ${PKG_VERSION}"
          if [ "${PKG_VERSION}" != "${TAG_VERSION}" ]; then
            echo "::error::Tag ${TAG_VERSION} does not match package.json version ${PKG_VERSION}"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      # Build first — `lint:examples` resolves the package self-reference
      # (`@mcptoolshop/db-cluster`, `@mcptoolshop/db-cluster/sdk`,
      # `@mcptoolshop/db-cluster/policy`) via the package.json `exports`
      # map, which requires dist/ to be populated.
      # Run order: build → lint → test.
      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: npm pack dry-run (verify shape)
        run: npm pack --dry-run

      - name: Publish to npm with provenance (OIDC trusted publisher)
        run: npm publish --provenance --access public

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "db-cluster ${GITHUB_REF_NAME}" \
            --generate-notes \
            --verify-tag

  docker:
    name: Build + publish multi-arch Docker image to GHCR
    runs-on: ubuntu-latest
    needs: release       # only after npm publish + GH release succeed
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3  # v4

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (semver + latest tags)
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9  # v6
        with:
          images: ghcr.io/mcp-tool-shop-org/db-cluster
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build + push (linux/amd64, linux/arm64)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
