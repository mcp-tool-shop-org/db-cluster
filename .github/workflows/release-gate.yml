name: Release Gate
on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      sha:
        description: 'Commit SHA to test (default: HEAD)'
        required: false
permissions:
  contents: read
jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.sha || github.sha }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - run: node scripts/release-gate.mjs
