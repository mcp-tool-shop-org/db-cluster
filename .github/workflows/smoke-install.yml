name: Smoke Install
on:
  push:
    tags: ['v*']
  pull_request:
    paths: ['package.json']
  workflow_dispatch:
permissions:
  contents: read
jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - run: node scripts/smoke-install.mjs
