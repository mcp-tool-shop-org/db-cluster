version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/New_York
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - npm
    commit-message:
      prefix: "deps"
      include: scope
    groups:
      typescript-toolchain:
        patterns:
          - "typescript"
          - "@types/*"
      stryker:
        patterns:
          - "@stryker-mutator/*"
      vitest:
        patterns:
          - "vitest"
          - "@vitest/*"
      mcp-sdk:
        patterns:
          - "@modelcontextprotocol/*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/New_York
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "ci(deps)"
